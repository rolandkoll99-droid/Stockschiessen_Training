<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESV Melktal – Trainingssystem</title>

<style>
/* ===== FARBEN KONFIGURIEREN ===== */
:root{
    --primary-green: #1f5e3a;
    --primary-green-dark: #0d3d22;
    --primary-red: #b93a32;
    --primary-gold: #ffdf8c;
    --primary-dark: #102417;
    --primary-light: #eef5e9;
    --border-color: #d7e4cf;
    --text-dark: #222222;
    --text-light: #ffffff;
    --text-green: #1f5e3a;
    --text-muted: #666666;
    --bg-body-start: #17351f;
    --bg-body-end: #0d1f13;
    --bg-card: #f7faf5;
    --bg-arena: #ffffff;
    --bg-header: var(--primary-green);
    --bg-active: #f3fff2;
    --bg-completed: #fff8e1;
    --team-e-color: #1f5e3a;
    --team-w-color: #b93a32;
    --shadow-color: rgba(0,0,0,0.3);
}

/* ===== LOGIN-STYLES ===== */
.login-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, var(--bg-body-start), var(--bg-body-end));
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 99999;
    transition: opacity 0.5s;
}

.login-overlay.hidden {
    opacity: 0;
    pointer-events: none;
}

.login-box {
    background: var(--bg-arena);
    padding: 40px;
    border-radius: 30px;
    max-width: 400px;
    width: 90%;
    box-shadow: 0 20px 60px var(--shadow-color);
    text-align: center;
}

.login-box h1 {
    color: var(--primary-green);
    font-size: 2rem;
    margin-bottom: 10px;
}

.login-box .subtitle {
    color: var(--text-muted);
    margin-bottom: 30px;
}

.login-box input {
    width: 100%;
    padding: 14px;
    border: 2px solid var(--border-color);
    border-radius: 12px;
    font-size: 1.1rem;
    margin-bottom: 15px;
    box-sizing: border-box;
}

.login-box input:focus {
    outline: none;
    border-color: var(--primary-green);
}

.login-box button {
    width: 100%;
    padding: 14px;
    background: var(--primary-green);
    color: var(--text-light);
    border: none;
    border-radius: 12px;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.3s;
}

.login-box button:hover {
    background: var(--primary-green-dark);
}

.login-box .error {
    color: var(--primary-red);
    margin-top: 10px;
    font-weight: 600;
    min-height: 30px;
}

.login-box .admin-hint {
    margin-top: 15px;
    padding: 10px;
    background: var(--bg-card);
    border-radius: 8px;
    font-size: 0.8rem;
    color: var(--text-muted);
}

/* ===== ADMIN-PANEL ===== */
.admin-panel {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 1000;
}

.admin-toggle {
    background: var(--primary-green);
    color: var(--text-light);
    border: none;
    border-radius: 50%;
    width: 50px;
    height: 50px;
    font-size: 1.5rem;
    cursor: pointer;
    box-shadow: 0 4px 15px var(--shadow-color);
    transition: transform 0.3s;
}

.admin-toggle:hover {
    transform: scale(1.1);
}

.admin-modal {
    position: fixed;
    bottom: 80px;
    right: 20px;
    background: var(--bg-arena);
    padding: 25px;
    border-radius: 16px;
    box-shadow: 0 10px 40px var(--shadow-color);
    width: 320px;
    display: none;
    z-index: 1001;
}

.admin-modal.active {
    display: block;
}

.admin-modal h3 {
    color: var(--primary-green);
    margin-bottom: 15px;
}

.admin-modal label {
    display: block;
    font-weight: 600;
    margin: 10px 0 5px;
    color: var(--text-dark);
}

.admin-modal input,
.admin-modal select {
    width: 100%;
    padding: 10px;
    border: 2px solid var(--border-color);
    border-radius: 8px;
    font-size: 1rem;
    box-sizing: border-box;
    background: var(--bg-arena);
    color: var(--text-dark);
}

.admin-modal button {
    margin-top: 15px;
    padding: 10px 20px;
    background: var(--primary-green);
    color: var(--text-light);
    border: none;
    border-radius: 8px;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
}

.admin-modal button:hover {
    background: var(--primary-green-dark);
}

.admin-modal .current-pw {
    margin-top: 10px;
    padding: 8px;
    background: var(--bg-card);
    border-radius: 6px;
    font-size: 0.9rem;
    color: var(--text-muted);
}

/* ===== ORIGINAL STYLES ===== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Segoe UI,Arial,sans-serif;
    background: linear-gradient(135deg, var(--bg-body-start), var(--bg-body-end));
    color: var(--text-dark);
    height:100vh;
    overflow:hidden;
}

#app-content {
    display: none;
    height: 100vh;
}

#app-content.visible {
    display: flex;
    flex-direction: column;
}

.header{
    position:sticky;
    top:0;
    z-index:1000;
    background: var(--bg-header);
    color: var(--text-light);
    padding:14px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:12px;
}

.header h1{
    font-size:1.6rem;
}

.header-controls{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    align-items:center;
}

button,
select,
input{
    border:none;
    border-radius:12px;
    padding:10px 14px;
    font-size:1rem;
}

button{
    cursor:pointer;
    background: var(--primary-green);
    color: var(--text-light);
    font-weight:700;
    transition: background 0.3s;
}

button:hover {
    background: var(--primary-green-dark);
}

.layout{
    display:flex;
    justify-content:center;
    padding:16px;
    flex: 1;
    overflow:hidden;
}

.arena{
    width:100%;
    max-width:1200px;
    background: var(--bg-arena);
    border-radius:22px;
    overflow:hidden;
    box-shadow:0 10px 30px var(--shadow-color);
    display:flex;
    flex-direction:column;
    height:100%;
}

.arena-header{
    background: var(--bg-card);
    padding:12px 16px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-shrink:0;
    flex-wrap:wrap;
    gap:10px;
}

.arena-title{
    font-size:1.6rem;
    font-weight:900;
    color: var(--text-green);
    text-align:center;
    flex:1;
}

.team-name-edit {
    display:flex;
    gap:15px;
    align-items:center;
    flex-wrap:wrap;
}

.team-name-edit input {
    padding: 6px 12px;
    border: 2px solid var(--border-color);
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 700;
    width: 140px;
    transition: border-color 0.3s;
}

.team-name-edit input:focus {
    outline: none;
    border-color: var(--primary-green);
}

.team-name-edit .team-e-input {
    color: var(--team-e-color);
}

.team-name-edit .team-w-input {
    color: var(--team-w-color);
}

.team-name-edit label {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text-muted);
}

.scoreboard{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    padding:0 14px 14px;
    flex-shrink:0;
}

.score-card{
    background: var(--bg-card);
    border-radius:18px;
    padding:16px;
    text-align:center;
    border-bottom:8px solid var(--team-e-color);
}

.score-card.red{
    border-bottom-color: var(--team-w-color);
}

.team-name{
    font-size:1.2rem;
    font-weight:900;
    margin-bottom:10px;
    color: var(--text-dark);
}

.team-score{
    font-size:3.4rem;
    font-weight:900;
    color: var(--text-green);
}

.team-points{
    margin-top:10px;
    font-weight:700;
    color: var(--text-dark);
}

.team-points span{
    display:inline-block;
    margin-top:6px;
    background: var(--primary-dark);
    color: var(--text-light);
    padding:6px 16px;
    border-radius:10px;
    font-size:1.2rem;
}

.info-bar{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
    padding:0 14px 14px;
    flex-shrink:0;
}

.info-box{
    background: var(--bg-card);
    padding:8px 14px;
    border-radius:12px;
    font-weight:800;
    color: var(--text-dark);
}

.kehren-wrapper{
    flex:1;
    overflow-y:auto;
    padding:0 14px 14px;
    min-height:0;
}

.kehren-wrapper::-webkit-scrollbar{
    width:8px;
}

.kehren-wrapper::-webkit-scrollbar-track{
    background: var(--bg-card);
    border-radius:10px;
}

.kehren-wrapper::-webkit-scrollbar-thumb{
    background: var(--primary-green);
    border-radius:10px;
}

.kehren-wrapper::-webkit-scrollbar-thumb:hover{
    background: var(--primary-green-dark);
}

.kehren{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
}

.kehren-title{
    text-align:center;
    font-weight:900;
    margin-bottom:8px;
    color: var(--text-dark);
}

.kehre-row{
    display:grid;
    grid-template-columns:90px 1fr 45px;
    gap:8px;
    align-items:center;
    background: var(--bg-arena);
    border:1px solid var(--border-color);
    border-radius:14px;
    padding:8px;
    margin-bottom:8px;
}

.kehre-row.active{
    border:3px solid #4caf50;
    background: var(--bg-active);
}

.kehre-row.completed{
    border:3px solid #ff9800;
    background: var(--bg-completed);
}

.kehre-number{
    font-size:.9rem;
    font-weight:900;
    color: var(--text-dark);
}

.points{
    display:flex;
    gap:5px;
    justify-content:center;
    flex-wrap:wrap;
}

.point-btn{
    min-width:34px;
    min-height:34px;
    border-radius:8px;
    border:2px solid var(--border-color);
    background: var(--bg-arena);
    color: var(--text-dark);
    font-weight:900;
    transition: all 0.2s;
    cursor: pointer;
}

.point-btn:hover{
    background: var(--primary-green);
    color: var(--text-light);
    transform: scale(1.05);
}

.point-btn.active-point{
    background: var(--primary-green);
    color: var(--text-light);
    border-color: var(--primary-green);
}

.kehre-value{
    text-align:center;
    font-weight:900;
    font-size:1.1rem;
    color: var(--text-dark);
}

.footer{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
    padding:14px;
    border-top:1px solid var(--border-color);
    flex-shrink:0;
}

.gold{
    background: var(--primary-gold);
    color: var(--text-dark);
}

.gold:hover {
    background: #f5d47a;
}

.toast{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background: var(--primary-dark);
    color: var(--text-light);
    padding:14px 20px;
    border-radius:14px;
    opacity:0;
    transition:.3s;
    z-index:9999;
}

.toast.show{
    opacity:1;
}

.player-selector{
    display:flex;
    gap:8px;
    align-items:center;
    background:rgba(255,255,255,0.15);
    padding:4px 12px 4px 8px;
    border-radius:40px;
}

.player-selector label{
    font-weight:600;
    font-size:0.9rem;
    color: var(--text-light);
}

.player-selector select{
    background: var(--bg-arena);
    color: var(--text-dark);
    padding:6px 10px;
    border-radius:30px;
    font-weight:700;
}

.point-info {
    background: rgba(255,255,255,0.1);
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 0.85rem;
    font-weight: 600;
    white-space: nowrap;
    color: var(--text-light);
}

.fixed-team{
    background: var(--bg-card);
    border-radius:30px;
    padding:2px 12px;
    font-weight:800;
    color: var(--text-dark);
    display:inline-block;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
    .kehre-row {
        grid-template-columns: 70px 1fr 35px;
        padding: 6px;
        gap: 5px;
    }
    
    .point-btn {
        min-width: 28px;
        min-height: 28px;
        font-size: 0.8rem;
    }
    
    .header h1 {
        font-size: 1.2rem;
    }
    
    .team-score {
        font-size: 2.5rem;
    }
    
    .team-name-edit input {
        width: 100px;
        font-size: 0.8rem;
    }
    
    .arena-header {
        flex-direction: column;
        align-items: stretch;
    }
}
</style>
</head>
<body>

<!-- ===== LOGIN OVERLAY ===== -->
<div class="login-overlay" id="loginOverlay">
    <div class="login-box">
        <h1>🥌 ESV Melktal</h1>
        <div class="subtitle">Trainingssystem</div>
        
        <input type="password" id="passwordInput" placeholder="Passwort eingeben..." autofocus>
        <button onclick="checkPassword()">🔓 Zugang</button>
        
        <div class="error" id="loginError"></div>
        
        <div class="admin-hint">
            🔑 Admin: Passwort kann unten rechts geändert werden
        </div>
    </div>
</div>

<!-- ===== ADMIN PANEL ===== -->
<div class="admin-panel" id="adminPanel">
    <button class="admin-toggle" onclick="toggleAdminModal()">⚙️</button>
    
    <div class="admin-modal" id="adminModal">
        <h3>⚙️ Admin-Panel</h3>
        <p style="color:var(--text-muted);font-size:0.9rem;margin-bottom:15px;">Hier kannst du Einstellungen anpassen</p>
        
        <label>Maximale Punkte pro Kehre</label>
        <select id="maxPointsSelect">
            <option value="3">3 Punkte (für 3 Spieler)</option>
            <option value="4" selected>4 Punkte (für 4 Spieler)</option>
            <option value="5">5 Punkte (für 5 Spieler)</option>
            <option value="6">6 Punkte (für 6 Spieler)</option>
            <option value="7">7 Punkte (Training)</option>
        </select>
        
        <label>Aktuelles Passwort</label>
        <input type="password" id="currentPasswordInput" placeholder="Aktuelles Passwort">
        
        <label>Neues Passwort</label>
        <input type="password" id="newPasswordInput" placeholder="Neues Passwort">
        
        <label>Neues Passwort bestätigen</label>
        <input type="password" id="confirmPasswordInput" placeholder="Neues Passwort bestätigen">
        
        <button onclick="changePassword()">🔑 Passwort ändern</button>
        
        <div class="error" id="adminError" style="margin-top:10px;font-size:0.9rem;"></div>
        <div class="current-pw" id="currentPwDisplay">Aktuelles Passwort: ********</div>
    </div>
</div>

<!-- ===== APP CONTENT ===== -->
<div id="app-content">
    <div class="header">
        <h1>🥌 ESV Melktal – Trainingssystem</h1>

        <div class="header-controls">
            <div class="player-selector">
                <label for="playerCount">👥 Spieler</label>
                <select id="playerCount">
                    <option value="3">3</option>
                    <option value="4" selected>4</option>
                    <option value="5">5</option>
                    <option value="6">6</option>
                    <option value="7">7</option>
                </select>
            </div>

            <select id="gamesSelect">
                <option value="2" selected>2 Siege</option>
                <option value="3">3 Siege</option>
                <option value="4">4 Siege</option>
                <option value="5">5 Siege</option>
                <option value="6">6 Siege</option>
            </select>

            <select id="kehrenSelect">
                <option value="4">4 Kehren</option>
                <option value="6" selected>6 Kehren</option>
                <option value="8">8 Kehren</option>
            </select>

            <span class="point-info" id="pointInfo">⭐ Max: 4 Pkt</span>

            <button onclick="openSpectatorWindow()">📺 Zuschauer-Monitor</button>
            <button onclick="fullReset()">🆕 Reset</button>
            <button onclick="logout()" style="background:var(--primary-red);">🚪 Logout</button>
        </div>
    </div>

    <div class="layout" id="layout"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== SPEICHER-SYSTEM FÜR TEAMNAMEN =====
const TEAM_NAMES_KEY = 'esv_grein_team_names';

function getTeamNames() {
    let names = localStorage.getItem(TEAM_NAMES_KEY);
    if (!names) {
        names = JSON.stringify({
            teamA: 'Mannschaft E',
            teamB: 'Mannschaft W'
        });
        localStorage.setItem(TEAM_NAMES_KEY, names);
    }
    return JSON.parse(names);
}

function saveTeamNames(teamA, teamB) {
    localStorage.setItem(TEAM_NAMES_KEY, JSON.stringify({
        teamA: teamA,
        teamB: teamB
    }));
}

// ===== PASSWORT-SYSTEM =====
const STORAGE_KEY = 'esv_grein_password';
const MAX_POINTS_KEY = 'esv_grein_max_points';

function getStoredPassword() {
    let pw = localStorage.getItem(STORAGE_KEY);
    if (!pw) {
        pw = 'admin123';
        localStorage.setItem(STORAGE_KEY, pw);
    }
    return pw;
}

function getMaxPoints() {
    let max = localStorage.getItem(MAX_POINTS_KEY);
    if (!max) {
        max = '4';
        localStorage.setItem(MAX_POINTS_KEY, max);
    }
    return parseInt(max);
}

function setMaxPoints(value) {
    localStorage.setItem(MAX_POINTS_KEY, value.toString());
    document.getElementById('maxPointsSelect').value = value;
    updatePointInfo(value);
}

function updatePointInfo(maxPoints) {
    document.getElementById('pointInfo').textContent = `⭐ Max: ${maxPoints} Pkt`;
}

function checkPassword() {
    const input = document.getElementById('passwordInput');
    const error = document.getElementById('loginError');
    const storedPw = getStoredPassword();
    
    if (input.value === storedPw) {
        document.getElementById('loginOverlay').classList.add('hidden');
        document.getElementById('app-content').classList.add('visible');
        error.textContent = '';
        input.value = '';
        input.blur();
        updateCurrentPasswordDisplay();
        document.getElementById('maxPointsSelect').value = getMaxPoints();
        updatePointInfo(getMaxPoints());
        syncPlayerCountWithMaxPoints();
    } else {
        error.textContent = '❌ Falsches Passwort! Bitte versuche es erneut.';
        input.value = '';
        input.focus();
        input.select();
    }
}

function logout() {
    document.getElementById('loginOverlay').classList.remove('hidden');
    document.getElementById('app-content').classList.remove('visible');
    document.getElementById('passwordInput').value = '';
    document.getElementById('passwordInput').focus();
    document.getElementById('loginError').textContent = '';
}

document.getElementById('passwordInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
        checkPassword();
    }
});

// ===== ADMIN-PANEL =====
function toggleAdminModal() {
    const modal = document.getElementById('adminModal');
    modal.classList.toggle('active');
    
    if (!modal.classList.contains('active')) {
        document.getElementById('currentPasswordInput').value = '';
        document.getElementById('newPasswordInput').value = '';
        document.getElementById('confirmPasswordInput').value = '';
        document.getElementById('adminError').textContent = '';
    } else {
        updateCurrentPasswordDisplay();
        document.getElementById('maxPointsSelect').value = getMaxPoints();
    }
}

function updateCurrentPasswordDisplay() {
    const pw = getStoredPassword();
    const display = document.getElementById('currentPwDisplay');
    const masked = '*'.repeat(pw.length);
    display.textContent = `Aktuelles Passwort: ${masked} (${pw.length} Zeichen)`;
}

function changePassword() {
    const currentPw = document.getElementById('currentPasswordInput').value;
    const newPw = document.getElementById('newPasswordInput').value;
    const confirmPw = document.getElementById('confirmPasswordInput').value;
    const error = document.getElementById('adminError');
    const maxPoints = document.getElementById('maxPointsSelect').value;
    
    const storedPw = getStoredPassword();
    
    setMaxPoints(parseInt(maxPoints));
    
    if (currentPw !== storedPw) {
        error.textContent = '❌ Aktuelles Passwort ist falsch!';
        return;
    }
    
    if (newPw.length < 4) {
        error.textContent = '❌ Neues Passwort muss mindestens 4 Zeichen haben!';
        return;
    }
    
    if (newPw !== confirmPw) {
        error.textContent = '❌ Neue Passwörter stimmen nicht überein!';
        return;
    }
    
    if (newPw === currentPw) {
        error.textContent = '❌ Neues Passwort muss sich vom alten unterscheiden!';
        return;
    }
    
    localStorage.setItem(STORAGE_KEY, newPw);
    error.textContent = '✅ Passwort erfolgreich geändert!';
    error.style.color = '#1f5e3a';
    
    document.getElementById('currentPasswordInput').value = '';
    document.getElementById('newPasswordInput').value = '';
    document.getElementById('confirmPasswordInput').value = '';
    
    updateCurrentPasswordDisplay();
    updatePointInfo(parseInt(maxPoints));
    syncPlayerCountWithMaxPoints();
    
    setTimeout(() => {
        error.textContent = '';
        error.style.color = '';
        document.getElementById('adminModal').classList.remove('active');
    }, 3000);
}

// ===== SYNC-FUNKTION =====
function syncPlayerCountWithMaxPoints() {
    const maxPoints = getMaxPoints();
    const playerSelect = document.getElementById('playerCount');
    playerSelect.value = maxPoints;
    state.playerCount = maxPoints;
    state.maxPoints = maxPoints;
    render();
    toast(`👥 ${maxPoints} Spieler – Max. ${maxPoints} Punkte pro Kehre`);
}

// ===== ORIGINAL APP CODE =====
const state = {
    kehren:6,
    winsToChampion:2,
    playerCount:4,
    maxPoints:4,
    arena:createArena(1)
};

function createArena(id){
    const names = getTeamNames();
    return {
        id,
        teamA: names.teamA,
        teamB: names.teamB,
        pointsA:Array(8).fill(null),
        pointsB:Array(8).fill(null),
        winsA:0,
        winsB:0
    };
}

function render(){
    document.getElementById('layout').innerHTML = renderArena(state.arena);
    updateSpectatorWindow();
    updatePointInfo(getMaxPoints());
    
    // Team-Namen in den Input-Feldern anzeigen
    const names = getTeamNames();
    document.getElementById('teamAInput').value = names.teamA;
    document.getElementById('teamBInput').value = names.teamB;
}

function renderArena(arena){
    const scoreA = sum(arena.pointsA);
    const scoreB = sum(arena.pointsB);
    const maxPoints = getMaxPoints();
    const names = getTeamNames();

    return `
    <div class="arena">
        <div class="arena-header">
            <div class="arena-title">🥌 ESV Melktal – Training</div>
            <div class="team-name-edit">
                <div>
                    <label>⚪ Team 1</label>
                    <input type="text" id="teamAInput" class="team-e-input" 
                           value="${names.teamA}" 
                           onchange="updateTeamName('A', this.value)"
                           placeholder="Team E Name">
                </div>
                <div>
                    <label>🔴 Team 2</label>
                    <input type="text" id="teamBInput" class="team-w-input" 
                           value="${names.teamB}" 
                           onchange="updateTeamName('B', this.value)"
                           placeholder="Team W Name">
                </div>
            </div>
        </div>

        <div class="scoreboard">
            <div class="score-card">
                <div class="team-name">⚪ ${names.teamA}</div>
                <div class="team-score">${scoreA}</div>
                <div class="team-points">
                    Gewonnene Spiele<br>
                    <span>${arena.winsA}</span>
                </div>
            </div>

            <div class="score-card red">
                <div class="team-name">🔴 ${names.teamB}</div>
                <div class="team-score">${scoreB}</div>
                <div class="team-points">
                    Gewonnene Spiele<br>
                    <span>${arena.winsB}</span>
                </div>
            </div>
        </div>

        <div class="kehren-wrapper">
            <div class="kehren">
                <div>
                    <div class="kehren-title">⚪ ${names.teamA}</div>
                    ${renderKehren(arena,'A')}
                </div>

                <div>
                    <div class="kehren-title">🔴 ${names.teamB}</div>
                    ${renderKehren(arena,'B')}
                </div>
            </div>
        </div>

        <div class="footer">
            <button class="gold" onclick="evaluateGame()">🏆 Spiel manuell werten</button>
            <button onclick="resetCurrent()">🔄 Kehren löschen</button>
        </div>
    </div>
    `;
}

function renderKehren(arena,team){
    let html='';
    const arr = team==='A' ? arena.pointsA : arena.pointsB;
    const maxPoints = getMaxPoints();
    const names = getTeamNames();

    for(let i=0;i<state.kehren;i++){
        const active = activeKehre(arena)===i+1;
        const isCompleted = arr[i] !== null;

        html += `
        <div class="kehre-row ${active?'active':''} ${isCompleted?'completed':''}">
            <div class="kehre-number">Kehre ${i+1}</div>
            <div class="points">
                ${Array.from({length: maxPoints + 1}, (_, v) => `
                    <button
                        class="point-btn ${arr[i] === v ? 'active-point' : ''}"
                        onclick="setPoints('${team}',${i},${v})">
                        ${v}
                    </button>
                `).join('')}
            </div>
            <div class="kehre-value">${arr[i] ?? '-'}</div>
        </div>
        `;
    }

    return html;
}

// ===== TEAM-NAMEN AKTUALISIEREN =====
function updateTeamName(team, newName) {
    const names = getTeamNames();
    
    if (team === 'A') {
        names.teamA = newName || 'Mannschaft E';
        state.arena.teamA = names.teamA;
    } else {
        names.teamB = newName || 'Mannschaft W';
        state.arena.teamB = names.teamB;
    }
    
    saveTeamNames(names.teamA, names.teamB);
    render();
    toast(`✅ Teamname geändert: ${team === 'A' ? names.teamA : names.teamB}`);
}

function setPoints(team,index,value){
    const arena = state.arena;

    if(hasWinner(arena)){
        toast('Training beendet');
        return;
    }

    if(team==='A'){
        arena.pointsA[index]=value;
        if(arena.pointsB[index]===null) arena.pointsB[index]=0;
    }else{
        arena.pointsB[index]=value;
        if(arena.pointsA[index]===null) arena.pointsA[index]=0;
    }

    render();

    if(allKehrenFilled(arena)){
        setTimeout(() => {
            autoEvaluateGame();
        }, 300);
    }
}

function allKehrenFilled(arena){
    for(let i=0;i<state.kehren;i++){
        if(arena.pointsA[i]===null || arena.pointsB[i]===null){
            return false;
        }
    }
    return true;
}

function autoEvaluateGame(){
    const arena = state.arena;
    const names = getTeamNames();

    if(hasWinner(arena)){
        return;
    }

    const a = sum(arena.pointsA);
    const b = sum(arena.pointsB);

    if(a>b){
        arena.winsA++;
        toast(`⚪ ${names.teamA} gewinnt das Spiel (${a}:${b})`);
    }
    else if(b>a){
        arena.winsB++;
        toast(`🔴 ${names.teamB} gewinnt das Spiel (${a}:${b})`);
    }
    else{
        toast(`Unentschieden (${a}:${b})`);
    }

    arena.pointsA = Array(state.kehren).fill(null);
    arena.pointsB = Array(state.kehren).fill(null);

    if(hasWinner(arena)){
        toast(`🏆 ${winnerName(arena)} gewinnt das Training!`);
    }

    render();
}

function evaluateGame(){
    const arena = state.arena;
    const names = getTeamNames();

    if(hasWinner(arena)){
        toast('Training beendet');
        return;
    }

    for(let i=0;i<state.kehren;i++){
        if(arena.pointsA[i]===null || arena.pointsB[i]===null){
            toast('Alle Kehren ausfüllen');
            return;
        }
    }

    const a = sum(arena.pointsA);
    const b = sum(arena.pointsB);

    if(a>b){
        arena.winsA++;
        toast(`⚪ ${names.teamA} gewinnt das Spiel (${a}:${b})`);
    }
    else if(b>a){
        arena.winsB++;
        toast(`🔴 ${names.teamB} gewinnt das Spiel (${a}:${b})`);
    }
    else{
        toast(`Unentschieden (${a}:${b})`);
    }

    arena.pointsA = Array(state.kehren).fill(null);
    arena.pointsB = Array(state.kehren).fill(null);

    if(hasWinner(arena)){
        toast(`🏆 ${winnerName(arena)} gewinnt das Training`);
    }

    render();
}

function activeKehre(arena){
    for(let i=0;i<state.kehren;i++){
        if(arena.pointsA[i]===null || arena.pointsB[i]===null){
            return i+1;
        }
    }
    return state.kehren;
}

function hasWinner(arena){
    return arena.winsA >= state.winsToChampion || arena.winsB >= state.winsToChampion;
}

function winnerName(arena){
    const names = getTeamNames();
    if(arena.winsA >= state.winsToChampion) return names.teamA;
    if(arena.winsB >= state.winsToChampion) return names.teamB;
    return '';
}

function sum(arr){
    return arr.reduce((a,b)=>a+(b||0),0);
}

function resetCurrent(){
    state.arena.pointsA = Array(state.kehren).fill(null);
    state.arena.pointsB = Array(state.kehren).fill(null);
    render();
}

function fullReset(){
    // Beim Reset werden die Team-Namen beibehalten
    const names = getTeamNames();
    state.arena = createArena(1);
    state.arena.teamA = names.teamA;
    state.arena.teamB = names.teamB;
    render();
    toast('🔄 Training zurückgesetzt - Teamnamen bleiben erhalten');
}

let spectatorWindow=null;

function openSpectatorWindow(){
    spectatorWindow = window.open('','spectator','width=1920,height=1080');

    spectatorWindow.document.write(`
    <html>
    <head>
    <title>Zuschauer Monitor</title>
    <style>
    body{
        margin:0;
        background:#102417;

        font-family:Arial,sans-serif;

function updateSpectatorWindow(){
    if(!spectatorWindow || spectatorWindow.closed) return;

    const arena = state.arena;
    const grid = spectatorWindow.document.getElementById('specGrid');
    const names = getTeamNames();

    if(!grid) return;

    grid.innerHTML = `
        <div class="title">🥌 ESV Melktal – Training</div>
        <div class="info-line">👥 ${state.playerCount} Spieler  |  🎯 ${state.kehren} Kehren  |  🏆 ${state.winsToChampion} Siege  |  ⭐ Max ${getMaxPoints()} Punkte</div>
        <div class="teams">
            <div class="team">
                <div class="name">⚪ ${names.teamA}</div>
                <div class="score">${sum(arena.pointsA)}</div>
                <div class="wins">🏆 ${arena.winsA}</div>
            </div>
            <div class="team">
                <div class="name">🔴 ${names.teamB}</div>
                <div class="score">${sum(arena.pointsB)}</div>
                <div class="wins">🏆 ${arena.winsB}</div>
            </div>
        </div>
    `;
}

function toast(msg){
    const t=document.getElementById('toast');
    t.textContent=msg;
    t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),2500);
}

// ===== EVENT-LISTENER =====
document.getElementById('playerCount').addEventListener('change', function(e){
    const playerCount = Number(e.target.value);
    state.playerCount = playerCount;
    setMaxPoints(playerCount);
    state.maxPoints = playerCount;
    state.arena.pointsA = Array(state.kehren).fill(null);
    state.arena.pointsB = Array(state.kehren).fill(null);
    render();
    toast(`👥 ${playerCount} Spieler – Max. ${playerCount} Punkte pro Kehre`);
});

document.getElementById('kehrenSelect').addEventListener('change', function(e){
    state.kehren = Number(e.target.value);
    state.arena.pointsA = Array(state.kehren).fill(null);
    state.arena.pointsB = Array(state.kehren).fill(null);
    render();
});

document.getElementById('gamesSelect').addEventListener('change', function(e){
    state.winsToChampion = Number(e.target.value);
    render();
});

document.getElementById('maxPointsSelect').addEventListener('change', function(e){
    const value = parseInt(e.target.value);
    setMaxPoints(value);
    state.maxPoints = value;
    document.getElementById('playerCount').value = value;
    state.playerCount = value;
    render();
    toast(`⭐ Maximale Punkte auf ${value} gesetzt (${value} Spieler)`);
});

// ===== APP START =====
render();

document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && document.getElementById('app-content').classList.contains('visible')) {
        if (confirm('Möchtest du dich wirklich ausloggen?')) {
            logout();
        }
    }
});

document.addEventListener('keydown', function(e) {
    if (e.ctrlKey && e.shiftKey && e.key === 'A') {
        e.preventDefault();
        toggleAdminModal();
    }
});
</script>
