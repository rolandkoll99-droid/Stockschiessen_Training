<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ESV Grein | Automatische Spielwertung | iPad optimiert</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #0f2e1a 0%, #091f0e 100%);
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, system-ui, 'Helvetica Neue', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .dashboard {
            width: 100%;
            height: 100%;
            background: #fefcf5;
            display: grid;
            grid-template-columns: 300px 1fr 300px;
            grid-template-rows: auto 1fr auto;
            overflow: hidden;
            box-shadow: 0 0 0 2px #d1e2c4;
        }

        .top-bar {
            grid-column: 1 / -1;
            background: white;
            padding: 12px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #deecd2;
            flex-wrap: wrap;
            gap: 10px;
            z-index: 10;
        }
        h1 {
            font-size: 1.5rem;
            background: #eef5e9;
            padding: 8px 24px;
            border-radius: 60px;
            color: #1b4d1b;
        }
        .settings-group {
            display: flex;
            gap: 15px;
            background: #f6faf3;
            padding: 8px 24px;
            border-radius: 60px;
            flex-wrap: wrap;
        }
        .team-name-input {
            border: 2px solid #c2d6b8;
            border-radius: 40px;
            padding: 8px 14px;
            font-weight: 600;
            width: 140px;
            text-align: center;
            font-size: 0.9rem;
        }
        .kehren-select, .apply-btn {
            padding: 8px 16px;
            border-radius: 40px;
            border: none;
            background: white;
            border: 1px solid #bbd4ae;
            font-weight: bold;
            font-size: 0.85rem;
        }
        .apply-btn {
            background: #2d6a4f;
            color: white;
            cursor: pointer;
        }
        .speech-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #eef3ea;
            padding: 6px 20px;
            border-radius: 40px;
            font-size: 0.85rem;
        }
        .speech-toggle input {
            width: 20px;
            height: 20px;
        }

        .input-left, .input-right {
            background: #fafdf8;
            overflow-y: auto;
            padding: 16px 12px;
        }
        .input-left { border-right: 2px solid #dae9ce; }
        .input-right { border-left: 2px solid #dae9ce; }

        .team-header {
            font-size: 1.2rem;
            font-weight: 800;
            text-align: center;
            background: #eef3ea;
            border-radius: 50px;
            padding: 10px;
            margin-bottom: 16px;
            color: #155f2e;
        }
        .kehren-grid-side {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .kehre-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 8px 12px;
            border-radius: 50px;
            border: 1px solid #e0ecd6;
            transition: background 0.1s ease;
        }
        .kehre-row.current-kehre-bg {
            background: #c8e6c9 !important;
            border-left: 5px solid #2e7d32;
        }
        .kehre-row.played-kehre-bg {
            background: #ffcdd2 !important;
            border-left: 5px solid #c62828;
        }
        .kehre-nr {
            font-weight: 800;
            width: 50px;
            font-size: 0.85rem;
            color: #2d692d;
        }
        .punkte-group {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .side-punkt {
            min-width: 48px;
            min-height: 44px;
            background: white;
            border: 2px solid #cbdfc1;
            border-radius: 40px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.05s linear;
        }
        .side-punkt:active { transform: scale(0.94); background: #eef5e8; }
        .side-value {
            background: #2c7a4d;
            color: white;
            padding: 6px 12px;
            border-radius: 40px;
            font-weight: 800;
            min-width: 52px;
            text-align: center;
            font-size: 0.9rem;
        }
        .side-del {
            background: #fef1ec;
            border: 2px solid #efcdc2;
            border-radius: 40px;
            width: 44px;
            height: 42px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
        }

        .center-hero {
            background: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 20px 28px;
            overflow-y: auto;
        }

        .result-mega {
            display: flex;
            gap: 35px;
            justify-content: center;
            align-items: stretch;
            margin: 10px 0 20px;
        }
        .result-card-big {
            flex: 1;
            background: #fafef5;
            border-radius: 48px;
            padding: 25px 20px;
            text-align: center;
            box-shadow: 0 12px 28px rgba(0,0,0,0.08);
            border: 1px solid #e2efda;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .result-team-big {
            font-size: 1.8rem;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 12px;
        }
        .current-round-big {
            font-size: 4rem;
            font-weight: 900;
            margin: 12px 0;
            color: #1c691c;
            background: #ecf7e5;
            border-radius: 80px;
            padding: 12px 10px;
        }
        .games-won-big {
            font-size: 0.9rem;
            background: #e9f2e2;
            border-radius: 60px;
            padding: 10px;
        }
        .games-number-big {
            font-size: 2.4rem;
            font-weight: 800;
            background: #1b4d1b;
            color: white;
            display: inline-block;
            padding: 4px 24px;
            border-radius: 60px;
            min-width: 90px;
        }
        .winner-badge-big {
            background: #ffd966;
            font-size: 0.85rem;
            border-radius: 50px;
            display: inline-block;
            padding: 4px 16px;
            margin-left: 10px;
        }

        .current-kehre-center {
            text-align: center;
            margin: 5px auto 5px auto;
            background: linear-gradient(135deg, #eef3e4, #e2ecd6);
            border-radius: 60px;
            padding: 6px 20px;
            display: inline-block;
            width: auto;
            box-shadow: 0 3px 10px rgba(0,0,0,0.05);
        }
        .current-kehre-label {
            font-size: 0.85rem;
            font-weight: 700;
            color: #4a6e3e;
            letter-spacing: 1px;
        }
        .current-kehre-number {
            font-size: 1.6rem;
            font-weight: 900;
            color: #1b4d1b;
            background: white;
            padding: 2px 22px;
            border-radius: 50px;
            display: inline-block;
            margin-left: 12px;
            min-width: 70px;
        }
        .info-wrapper {
            display: flex;
            justify-content: center;
            margin-top: 5px;
        }

        .global-winner {
            background: #ffecb3;
            border-radius: 60px;
            padding: 8px 24px;
            margin-top: 12px;
            text-align: center;
            font-weight: bold;
            font-size: 0.9rem;
        }
        .lock-info {
            font-size: 0.75rem;
            background: #f1e6cc;
            border-radius: 30px;
            padding: 4px 16px;
            display: inline-block;
            margin-left: 12px;
        }

        .action-footer {
            grid-column: 1 / -1;
            background: white;
            border-top: 2px solid #dae8d0;
            padding: 14px 28px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .action-btn {
            background: #f0f5eb;
            border: none;
            padding: 10px 28px;
            border-radius: 60px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.85rem;
            min-width: 130px;
            transition: 0.05s;
        }
        .action-btn:active { transform: scale(0.96); }
        .action-win { background: #ffdf8c; color: #1e4a1a; }
        .action-reset { background: #e6ede0; }
        .action-new { background: #1e5a2e; color: white; }
        .action-clear { background: #fadbd2; color: #a33929; }
        .action-pdf { background: #a43424; color: white; }

        .toast-msg {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a472a;
            color: white;
            padding: 12px 28px;
            border-radius: 60px;
            z-index: 5000;
            font-weight: 600;
            font-size: 1rem;
            pointer-events: none;
        }

        body.game-finished .side-punkt,
        body.game-finished .side-del,
        body.game-finished .action-win,
        body.game-finished .action-reset {
            opacity: 0.5;
            pointer-events: none;
        }

        .input-left::-webkit-scrollbar, .input-right::-webkit-scrollbar { width: 5px; }
    </style>
</head>
<body>
<div class="dashboard">
    <div class="top-bar">
        <h1>🥌 ESV Grein · Automatik-Wertung 🥌</h1>
        <div class="settings-group">
            <input type="text" id="teamANameSide" class="team-name-input" value="Mannschaft W">
            <span>🆚</span>
            <input type="text" id="teamBNameSide" class="team-name-input" value="Mannschaft E">
            <select id="kehrenSelectSide">
                <option value="4">4 Kehren</option>
                <option value="6" selected>6 Kehren</option>
                <option value="8">8 Kehren</option>
                <option value="10">10 Kehren</option>
                <option value="12">12 Kehren</option>
            </select>
            <button id="applyKehrenSide" class="apply-btn">Übernehmen</button>
            <div class="speech-toggle"><input type="checkbox" id="speechToggleSide" checked><label>🔊 Sprachansage</label></div>
        </div>
    </div>

    <div class="input-left">
        <div class="team-header"><span>🥌</span> <span id="leftTeamName">Mannschaft W</span></div>
        <div id="leftKehrenPanel" class="kehren-grid-side"></div>
        <div style="text-align:center; font-size:10px; margin-top:16px; color:#698a69;">👆 Punkte 1-4 antippen</div>
    </div>

    <div class="center-hero">
        <div class="result-mega">
            <div class="result-card-big" style="border-bottom: 6px solid #2c7a4d;">
                <div class="result-team-big"><span>🥌</span> <span id="centerTeamA">Mannschaft W</span></div>
                <div class="current-round-big" id="centerRoundA">0</div>
                <div class="games-won-big">🏆 GEWONNENE SPIELE 🏆<br><span class="games-number-big" id="centerGamesA">0</span><span id="stampA" class="winner-badge-big"></span></div>
            </div>
            <div class="result-card-big" style="border-bottom: 6px solid #c0392b;">
                <div class="result-team-big"><span id="centerTeamB">Mannschaft E</span> <span>🥌</span></div>
                <div class="current-round-big" id="centerRoundB">0</div>
                <div class="games-won-big">🏆 GEWONNENE SPIELE 🏆<br><span class="games-number-big" id="centerGamesB">0</span><span id="stampB" class="winner-badge-big"></span></div>
            </div>
        </div>

        <div class="info-wrapper">
            <div class="current-kehre-center">
                <span class="current-kehre-label">🟢 AKTUELLE KEHRE</span>
                <span class="current-kehre-number" id="currentKehreDisplay">1</span>
            </div>
        </div>

        <div id="globalWinnerMsg" style="margin-top: 10px; text-align: center;"></div>
        <div id="lockInfoMitte" class="lock-info" style="display: none; text-align: center;">🔒 Gesamtsieger steht fest</div>
    </div>

    <div class="input-right">
        <div class="team-header"><span id="rightTeamName">Mannschaft E</span> <span>🥌</span></div>
        <div id="rightKehrenPanel" class="kehren-grid-side"></div>
        <div style="text-align:center; font-size:10px; margin-top:16px; color:#698a69;">👆 Punkte 1-4 antippen</div>
    </div>

    <div class="action-footer">
        <button class="action-btn action-win" id="winGameBtn">🏆 Manuell werten</button>
        <button class="action-btn action-reset" id="resetRoundBtn">🔄 Runde löschen</button>
        <button class="action-btn action-new" id="newGameBtn">✨ Neues Spiel</button>
        <button class="action-btn action-clear" id="resetTotalBtn">🗑️ Siege zurücksetzen</button>
        <button class="action-btn action-pdf" id="printPDFBtn">🖨️ Drucken (PDF)</button>
    </div>
</div>

<script>
    // -------------------- SPIELSTAND --------------------
    let anzahlKehren = 6;
    let teamAPunkte = new Array(6).fill(0);
    let teamBPunkte = new Array(6).fill(0);
    let gamesWonA = 0, gamesWonB = 0;
    let overallWinner = false;          // true wenn ein Team 2 Spiele gewonnen hat
    let teamAName = "Mannschaft W";
    let teamBName = "Mannschaft E";
    let speechEnabled = true;
    let autoEvaluationLock = false;      // verhindert mehrfache automatische Spielwertung

    // DOM
    const centerTeamA = document.getElementById('centerTeamA');
    const centerTeamB = document.getElementById('centerTeamB');
    const centerRoundA = document.getElementById('centerRoundA');
    const centerRoundB = document.getElementById('centerRoundB');
    const centerGamesA = document.getElementById('centerGamesA');
    const centerGamesB = document.getElementById('centerGamesB');
    const stampA = document.getElementById('stampA');
    const stampB = document.getElementById('stampB');
    const currentKehreSpan = document.getElementById('currentKehreDisplay');
    const globalWinnerMsgDiv = document.getElementById('globalWinnerMsg');
    const lockInfoMitte = document.getElementById('lockInfoMitte');

    const sum = arr => arr.reduce((a,b)=>a+b,0);

    // ----- Helper: Prüfen ob alle Kehren belegt sind (beide Teams haben Werte >0 oder zumindest eingetragen - hier zählt, dass beide Felder nicht mehr 0/0 sind)
    function isEveryKehrePlayed() {
        for (let i = 0; i < anzahlKehren; i++) {
            // Eine Kehre gilt als gespielt, wenn mindestens ein Team Punkte hat (üblich im Curling)
            if (teamAPunkte[i] === 0 && teamBPunkte[i] === 0) return false;
        }
        return true;
    }

    // Automatische Spielauswertung: Wer hat nach allen Kehren mehr Punkte?
    function autoEvaluateGameIfComplete() {
        if (overallWinner) return false;
        if (!isEveryKehrePlayed()) return false;
        if (autoEvaluationLock) return false;   // bereits am auswerten

        const totalA = sum(teamAPunkte);
        const totalB = sum(teamBPunkte);
        
        // Nur auswerten wenn tatsächlich Punkte existieren
        if (totalA === 0 && totalB === 0) return false;
        
        autoEvaluationLock = true;
        
        let winnerTeam = null; // 'A' oder 'B'
        let isTie = false;
        
        if (totalA > totalB) winnerTeam = 'A';
        else if (totalB > totalA) winnerTeam = 'B';
        else isTie = true;
        
        const winnerName = winnerTeam === 'A' ? teamAName : (winnerTeam === 'B' ? teamBName : null);
        
        if (!isTie && winnerTeam) {
            // AUTOMATISCHEN SIEG VERGEBEN (ein Punkt für die Mannschaft)
            speakText(`Alle ${anzahlKehren} Kehren gespielt. ${winnerName} gewinnt das Spiel mit ${totalA}:${totalB}.`);
            showToast(`🏆 Automatische Wertung: ${winnerName} gewinnt das Spiel! (${totalA}:${totalB})`, 3000);
            
            // Punkt für den Sieger eintragen
            if (winnerTeam === 'A') {
                gamesWonA++;
            } else {
                gamesWonB++;
            }
            updateCenterUI();
            
            // Prüfen ob jetzt Gesamtsieger (2 Siege)
            checkAndSetOverallWinner();
            
            // Nachdem das Spiel gewertet wurde: Rücksetzen der Kehren für nächstes Spiel
            // Nur zurücksetzen, wenn noch kein Gesamtsieger feststeht (sonst bleibt alles stehen)
            if (!overallWinner) {
                // Reset für neue Runde: Kehren alle auf 0 setzen, aber Siege bleiben
                for (let i = 0; i < anzahlKehren; i++) {
                    teamAPunkte[i] = 0;
                    teamBPunkte[i] = 0;
                }
                renderFullSidePanels();
                updateCenterUI();
                showToast("🔄 Neue Runde – Kehren zurückgesetzt", 2000);
                speakText("Neue Runde, Kehren zurückgesetzt.");
            } else {
                // Spiel ist komplett beendet, keine Änderungen mehr
                renderFullSidePanels();
                updateCenterUI();
            }
            autoEvaluationLock = false;
            return true;
        } 
        else if (isTie) {
            // Unentschieden: Keine automatische Wertung, Benutzer muss via "Spiel gewinnen" entscheiden
            speakText(`Alle ${anzahlKehren} Kehren gespielt. Das Spiel endet unentschieden mit ${totalA}:${totalB}. Bitte entscheiden Sie manuell über den Sieger.`);
            showToast(`⚠️ Unentschieden (${totalA}:${totalB}) – Bitte "Spiel gewinnen" für Entscheidung nutzen.`, 4000);
            globalWinnerMsgDiv.innerHTML = `<div class="global-winner" style="background:#ffe0a3;">🤝 UNENTSCHIEDEN nach ${anzahlKehren} Kehren (${totalA}:${totalB}). Klicke "Spiel gewinnen" und wähle Sieger.</div>`;
            autoEvaluationLock = false;
            return false;
        }
        autoEvaluationLock = false;
        return false;
    }

    // Gesamtsiegerprüfung: Wenn 2 Spiele gewonnen -> overallWinner = true
    function checkAndSetOverallWinner() {
        if (gamesWonA >= 2) {
            overallWinner = true;
            speakText(`🏆 Gesamtsieger: ${teamAName} hat zwei Spiele gewonnen und gewinnt den Wettkampf!`);
            showToast(`🏆🏆🏆 ${teamAName} ist GESAMTSIEGER! 🏆🏆🏆`, 5000);
            updateCenterUI();
            return true;
        } else if (gamesWonB >= 2) {
            overallWinner = true;
            speakText(`🏆 Gesamtsieger: ${teamBName} hat zwei Spiele gewonnen und gewinnt den Wettkampf!`);
            showToast(`🏆🏆🏆 ${teamBName} ist GESAMTSIEGER! 🏆🏆🏆`, 5000);
            updateCenterUI();
            return true;
        }
        return false;
    }

    function getCurrentKehreNumber() {
        if (overallWinner) return anzahlKehren;
        for (let i = 0; i < anzahlKehren; i++) {
            if (teamAPunkte[i] === 0 && teamBPunkte[i] === 0) {
                return i + 1;
            }
        }
        return anzahlKehren;
    }

    function updateKehrenColors() {
        const currentKehre = getCurrentKehreNumber();
        const leftRows = document.querySelectorAll('#leftKehrenPanel .kehre-row');
        const rightRows = document.querySelectorAll('#rightKehrenPanel .kehre-row');
        for (let i = 0; i < leftRows.length; i++) {
            const kehreIndex = i + 1;
            leftRows[i].classList.remove('current-kehre-bg', 'played-kehre-bg');
            rightRows[i].classList.remove('current-kehre-bg', 'played-kehre-bg');
            if (overallWinner) continue;
            if (kehreIndex === currentKehre) {
                leftRows[i].classList.add('current-kehre-bg');
                rightRows[i].classList.add('current-kehre-bg');
            } else if (kehreIndex < currentKehre) {
                leftRows[i].classList.add('played-kehre-bg');
                rightRows[i].classList.add('played-kehre-bg');
            }
        }
    }

    function updateKehreDisplay() {
        if (overallWinner) {
            currentKehreSpan.innerText = "🏆";
            updateKehrenColors();
            return;
        }
        const current = getCurrentKehreNumber();
        currentKehreSpan.innerText = current;
        updateKehrenColors();
        
        // Automatischen Check, ob alle Kehren voll – aber NUR wenn noch nicht ausgewertet & kein Gesamtsieger
        if (isEveryKehrePlayed() && !overallWinner && !autoEvaluationLock) {
            autoEvaluateGameIfComplete();
        } else if (!isEveryKehrePlayed()) {
            // Hinweistext zurücksetzen falls nur Teilinfo da
            const msgDiv = document.getElementById('globalWinnerMsg');
            if (msgDiv && msgDiv.innerHTML.includes("UNENTSCHIEDEN")) {
                msgDiv.innerHTML = '';
            }
        }
    }

    function updateCenterUI() {
        centerRoundA.innerText = sum(teamAPunkte);
        centerRoundB.innerText = sum(teamBPunkte);
        centerGamesA.innerText = gamesWonA;
        centerGamesB.innerText = gamesWonB;
        if (gamesWonA >= 2) stampA.innerText = '🏆 GESAMTSIEGER';
        else stampA.innerText = '';
        if (gamesWonB >= 2) stampB.innerText = '🏆 GESAMTSIEGER';
        else stampB.innerText = '';

        if (overallWinner) {
            const winnerName = gamesWonA >= 2 ? teamAName : teamBName;
            globalWinnerMsgDiv.innerHTML = `<div class="global-winner">🏆🏆🏆 ${winnerName} hat 2 Spiele gewonnen & ist GESAMTSIEGER! 🏆🏆🏆</div>`;
            lockInfoMitte.style.display = 'inline-block';
            document.body.classList.add('game-finished');
        } else {
            if (!isEveryKehrePlayed()) {
                if (globalWinnerMsgDiv.innerHTML.includes("UNENTSCHIEDEN") === false)
                    globalWinnerMsgDiv.innerHTML = '';
            }
            lockInfoMitte.style.display = 'none';
            document.body.classList.remove('game-finished');
        }
        updateKehreDisplay();
    }

    function speakText(text) {
        if (!speechEnabled) return;
        if ('speechSynthesis' in window) {
            try { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(text); u.lang='de-DE'; u.rate=0.9; window.speechSynthesis.speak(u); } catch(e) {}
        }
    }
    function showToast(msg, duration=2200) {
        let t = document.getElementById('dynamicToast');
        if(!t){ t=document.createElement('div'); t.id='dynamicToast'; t.className='toast-msg'; document.body.appendChild(t); }
        t.innerText=msg; t.style.display='block'; setTimeout(()=>t.style.display='none',duration);
    }

    function setPoints(team, kehreIdx, punkte) {
        if (overallWinner) { showToast("Spiel beendet – neues Spiel starten"); return; }
        if (punkte>=1 && punkte<=4) {
            let old = (team==='A') ? teamAPunkte[kehreIdx] : teamBPunkte[kehreIdx];
            if (old !== punkte) {
                if (team==='A') teamAPunkte[kehreIdx] = punkte;
                else teamBPunkte[kehreIdx] = punkte;
                const tname = (team==='A') ? teamAName : teamBName;
                speakText(`${tname} erzielt bei Kehre ${kehreIdx+1} ${punkte===1 ? 'einen Punkt' : punkte+' Punkte'}.`);
                renderFullSidePanels();
                updateCenterUI();
                
                // Automatische Prüfung nach jeder Punkteingabe
                if (isEveryKehrePlayed() && !overallWinner && !autoEvaluationLock) {
                    autoEvaluateGameIfComplete();
                }
            }
        }
    }

    function deleteKehre(team, kehreIdx) {
        if (overallWinner) { showToast("Spiel beendet"); return; }
        if (team==='A') teamAPunkte[kehreIdx]=0;
        else teamBPunkte[kehreIdx]=0;
        renderFullSidePanels();
        updateCenterUI();
        showToast(`Punkt in Kehre ${kehreIdx+1} gelöscht`, 1200);
        // Falls durch löschen unentschieden-meldung nicht mehr relevant
        if (globalWinnerMsgDiv.innerHTML.includes("UNENTSCHIEDEN")) globalWinnerMsgDiv.innerHTML = '';
    }

    function resetRoundOnly() {
        if (overallWinner) { showToast("Spiel vorbei, neues Spiel starten"); return; }
        for (let i=0;i<anzahlKehren;i++) { teamAPunkte[i]=0; teamBPunkte[i]=0; }
        renderFullSidePanels();
        updateCenterUI();
        globalWinnerMsgDiv.innerHTML = '';
        showToast("Runde komplett gelöscht – starte bei Kehre 1", 2000);
        speakText("Runde gelöscht, alle Kehren zurückgesetzt.");
        autoEvaluationLock = false;
    }

    function addWin(winner) {
        if (overallWinner) return;
        if (winner === 'A') gamesWonA++; else gamesWonB++;
        updateCenterUI();
        if (!checkAndSetOverallWinner()) {
            // Keine Gesamtsieger, dann Kehren für neue Runde zurücksetzen
            for (let i=0;i<anzahlKehren;i++) { teamAPunkte[i]=0; teamBPunkte[i]=0; }
            renderFullSidePanels();
            updateCenterUI();
            showToast("Neue Runde gestartet – Kehren zurückgesetzt", 1500);
        } else {
            // overallWinner = true; UI sperrt sich
            renderFullSidePanels();
            updateCenterUI();
        }
        autoEvaluationLock = false;
    }

    // Manuelles Gewinnen (falls Unentschieden oder Eingriff)
    function winGameHandler() {
        if (overallWinner) { showToast("Spiel bereits entschieden – neues Spiel starten"); return; }
        const sumA = sum(teamAPunkte), sumB = sum(teamBPunkte);
        if (sumA===0 && sumB===0) { showToast("Keine Punkte eingetragen!"); return; }
        if (sumA === sumB) {
            const modalDiv = document.createElement('div');
            modalDiv.style.position='fixed'; modalDiv.style.top=0; modalDiv.style.left=0; modalDiv.style.right=0; modalDiv.style.bottom=0;
            modalDiv.style.background='rgba(0,0,0,0.7)'; modalDiv.style.display='flex'; modalDiv.style.alignItems='center'; modalDiv.style.justifyContent='center'; modalDiv.style.zIndex=9999;
            modalDiv.innerHTML = `<div style="background:white; border-radius: 48px; padding:24px; text-align:center;"><h3>🤝 Unentschieden</h3><p>${sumA}:${sumB} – Wer gewinnt das Spiel?</p><div style="display:flex; gap:14px; justify-content:center; margin-top:16px;"><button id="chooseA" style="background:#2c7a4d; color:white; border:none; padding:8px 20px; border-radius:40px;">🥌 ${teamAName}</button><button id="chooseB" style="background:#c0392b; color:white; border:none; padding:8px 20px; border-radius:40px;">🥌 ${teamBName}</button><button id="cancelModal" style="background:#ccc;">Abbrechen</button></div></div>`;
            document.body.appendChild(modalDiv);
            modalDiv.querySelector('#chooseA').onclick = () => { addWin('A'); modalDiv.remove(); };
            modalDiv.querySelector('#chooseB').onclick = () => { addWin('B'); modalDiv.remove(); };
            modalDiv.querySelector('#cancelModal').onclick = () => modalDiv.remove();
        } else {
            const winner = sumA > sumB ? 'A' : 'B';
            const winnerName = winner === 'A' ? teamAName : teamBName;
            if (confirm(`${winnerName} gewinnt das Spiel (${sumA}:${sumB}). Bestätigen?`)) addWin(winner);
        }
    }

    function newGameReset() {
        if (confirm("KOMPLETTRESET: Alle Punkte, Siege werden zurückgesetzt")) {
            for (let i=0;i<anzahlKehren;i++) { teamAPunkte[i]=0; teamBPunkte[i]=0; }
            gamesWonA=0; gamesWonB=0; overallWinner=false; autoEvaluationLock=false;
            updateCenterUI();
            renderFullSidePanels();
            globalWinnerMsgDiv.innerHTML = '';
            showToast("Neues Spiel gestartet – Kehre 1", 2000);
            speakText("Neues Spiel gestartet. Kehre 1.");
            document.body.classList.remove('game-finished');
        }
    }
    function resetTotalScoreOnly() {
        if (confirm("Nur gewonnene Spiele zurücksetzen? (Rundenpunkte bleiben, aber Gesamtsieger wird entfernt)")) {
            gamesWonA=0; gamesWonB=0; overallWinner=false; autoEvaluationLock=false;
            updateCenterUI();
            renderFullSidePanels();
            globalWinnerMsgDiv.innerHTML = '';
            showToast("Siege zurückgesetzt", 1500);
            speakText("Gewonnene Spiele wurden zurückgesetzt.");
            document.body.classList.remove('game-finished');
        }
    }

    function changeKehrenAnzahl(neu) {
        const neueA = new Array(neu).fill(0);
        const neueB = new Array(neu).fill(0);
        for(let i=0;i<Math.min(teamAPunkte.length,neu);i++) { neueA[i]=teamAPunkte[i]; neueB[i]=teamBPunkte[i]; }
        teamAPunkte = neueA; teamBPunkte = neueB;
        anzahlKehren = neu;
        renderFullSidePanels();
        updateCenterUI();
        showToast(`Kehrenanzahl auf ${neu} geändert`, 1500);
    }

    function renderFullSidePanels() {
        document.getElementById('leftTeamName').innerHTML = teamAName;
        document.getElementById('rightTeamName').innerHTML = teamBName;
        centerTeamA.innerText = teamAName;
        centerTeamB.innerText = teamBName;

        const leftPanel = document.getElementById('leftKehrenPanel');
        leftPanel.innerHTML = '';
        for(let i=0;i<anzahlKehren;i++) {
            const row = document.createElement('div'); row.className = 'kehre-row';
            row.innerHTML = `<div class="kehre-nr">${i+1}</div><div class="punkte-group">
                <button class="side-punkt" data-val="1">1</button><button class="side-punkt" data-val="2">2</button>
                <button class="side-punkt" data-val="3">3</button><button class="side-punkt" data-val="4">4</button>
                <span class="side-value">${teamAPunkte[i]||0}</span>
                <button class="side-del">🗑️</button>
            </div>`;
            const btns = row.querySelectorAll('.side-punkt');
            btns.forEach(btn => btn.addEventListener('click', (e) => { const val = parseInt(btn.getAttribute('data-val')); setPoints('A', i, val); }));
            const del = row.querySelector('.side-del');
            del.addEventListener('click', () => deleteKehre('A', i));
            leftPanel.appendChild(row);
        }
        const rightPanel = document.getElementById('rightKehrenPanel');
        rightPanel.innerHTML = '';
        for(let i=0;i<anzahlKehren;i++) {
            const row = document.createElement('div'); row.className = 'kehre-row';
            row.innerHTML = `<div class="kehre-nr">${i+1}</div><div class="punkte-group">
                <button class="side-punkt" data-val="1">1</button><button class="side-punkt" data-val="2">2</button>
                <button class="side-punkt" data-val="3">3</button><button class="side-punkt" data-val="4">4</button>
                <span class="side-value">${teamBPunkte[i]||0}</span>
                <button class="side-del">🗑️</button>
            </div>`;
            const btns = row.querySelectorAll('.side-punkt');
            btns.forEach(btn => btn.addEventListener('click', (e) => { const val = parseInt(btn.getAttribute('data-val')); setPoints('B', i, val); }));
            const del = row.querySelector('.side-del');
            del.addEventListener('click', () => deleteKehre('B', i));
            rightPanel.appendChild(row);
        }
        updateKehrenColors();
    }

    // Event Bindings
    document.getElementById('applyKehrenSide').onclick = () => {
        let neu = parseInt(document.getElementById('kehrenSelectSide').value);
        if(neu !== anzahlKehren && confirm(`Kehrenanzahl auf ${neu} ändern?`)) changeKehrenAnzahl(neu);
    };
    document.getElementById('teamANameSide').oninput = (e) => { teamAName = e.target.value.trim() || "Team A"; renderFullSidePanels(); updateCenterUI(); };
    document.getElementById('teamBNameSide').oninput = (e) => { teamBName = e.target.value.trim() || "Team B"; renderFullSidePanels(); updateCenterUI(); };
    document.getElementById('speechToggleSide').onchange = (e) => speechEnabled = e.target.checked;
    document.getElementById('winGameBtn').onclick = winGameHandler;
    document.getElementById('resetRoundBtn').onclick = resetRoundOnly;
    document.getElementById('newGameBtn').onclick = newGameReset;
    document.getElementById('resetTotalBtn').onclick = resetTotalScoreOnly;
    document.getElementById('printPDFBtn').onclick = () => window.print();

    function init() {
        anzahlKehren = 6;
        teamAPunkte = new Array(6).fill(0);
        teamBPunkte = new Array(6).fill(0);
        gamesWonA = 0; gamesWonB = 0; overallWinner = false; autoEvaluationLock=false;
        teamAName = "Mannschaft W"; teamBName = "Mannschaft E";
        document.getElementById('teamANameSide').value = teamAName;
        document.getElementById('teamBNameSide').value = teamBName;
        speechEnabled = true;
        document.getElementById('speechToggleSide').checked = true;
        renderFullSidePanels();
        updateCenterUI();
    }
    init();
</script>
</body>
</html>
