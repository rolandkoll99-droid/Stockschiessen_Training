<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESV Grein – Trainingwertung</title>

<style>
:root{
    --green:#1f5e3a;
    --red:#b93a32;
    --gold:#ffdf8c;
    --dark:#102417;
    --light:#eef5e9;
    --border:#d7e4cf;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Segoe UI,Arial,sans-serif;
    background:linear-gradient(135deg,#17351f,#0d1f13);
    color:#222;
}

.header{
    position:sticky;
    top:0;
    z-index:1000;
    background:var(--green);
    color:white;
    padding:14px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:12px;
}

.header h1{
    font-size:1.6rem;
}

.header-controls{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

button,
select,
input{
    border:none;
    border-radius:12px;
    padding:10px 14px;
    font-size:1rem;
}

button{
    cursor:pointer;
    background:var(--green);
    color:white;
    font-weight:700;
}

.layout{
    display:flex;
    justify-content:center;
    padding:16px;
}

.arena{
    width:100%;
    max-width:1200px;
    background:white;
    border-radius:22px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
}

.arena-header{
    background:var(--light);
    padding:12px 16px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:10px;
}

.arena-title{
    font-size:1.4rem;
    font-weight:900;
    color:var(--green);
}

.bahn-selector{
    display:flex;
    gap:8px;
    align-items:center;
}

.bahn-btn{
    background:#ddd;
    color:black;
    min-width:42px;
}

.bahn-btn.active{
    background:var(--gold);
}

.team-inputs{
    display:grid;
    grid-template-columns:1fr auto 1fr;
    gap:10px;
    padding:14px;
}

.team-inputs input{
    border:1px solid var(--border);
}

.scoreboard{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    padding:0 14px 14px;
}

.score-card{
    background:#f7faf5;
    border-radius:18px;
    padding:16px;
    text-align:center;
    border-bottom:8px solid var(--green);
}

.score-card.red{
    border-bottom-color:var(--red);
}

.team-name{
    font-size:1.2rem;
    font-weight:900;
    margin-bottom:10px;
}

.team-score{
    font-size:3.4rem;
    font-weight:900;
    color:var(--green);
}

.team-points{
    margin-top:10px;
    font-weight:700;
}

.team-points span{
    display:inline-block;
    margin-top:6px;
    background:var(--dark);
    color:white;
    padding:6px 16px;
    border-radius:10px;
    font-size:1.2rem;
}

.info-bar{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
    padding:0 14px 14px;
}

.info-box{
    background:var(--light);
    padding:8px 14px;
    border-radius:12px;
    font-weight:800;
}

.kehren{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
    padding:0 14px 14px;
}

.kehren-title{
    text-align:center;
    font-weight:900;
    margin-bottom:8px;
}

.kehre-row{
    display:grid;
    grid-template-columns:90px 1fr 45px;
    gap:8px;
    align-items:center;
    background:white;
    border:1px solid var(--border);
    border-radius:14px;
    padding:8px;
    margin-bottom:8px;
}

.kehre-row.active{
    border:3px solid #4caf50;
    background:#f3fff2;
}

.kehre-number{
    font-size:.9rem;
    font-weight:900;
}

.points{
    display:flex;
    gap:5px;
    justify-content:center;
}

.point-btn{
    min-width:34px;
    min-height:34px;
    border-radius:8px;
    border:2px solid var(--border);
    background:white;
    color:black;
    font-weight:900;
}

.point-btn:hover{
    background:var(--green);
    color:white;
}

.kehre-value{
    text-align:center;
    font-weight:900;
    font-size:1.1rem;
}

.footer{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
    padding:14px;
    border-top:1px solid var(--border);
}

.gold{
    background:var(--gold);
    color:black;
}

.toast{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:#111;
    color:white;
    padding:14px 20px;
    border-radius:14px;
    opacity:0;
    transition:.3s;
}

.toast.show{
    opacity:1;
}
</style>
</head>
<body>

<div class="header">
    <h1>🥌 ESV Grein – Traingswertung</h1>

    <div class="header-controls">

        <select id="gamesSelect">
            <option value="2" selected>2 Siege</option>
            <option value="3">3 Siege</option>
            <option value="4">4 Siege</option>
            <option value="5">5 Siege</option>
            <option value="6">6 Siege</option>
        </select>

        <select id="kehrenSelect">
            <option>4</option>
            <option selected>6</option>
            <option>8</option>
            <option>10</option>
            <option>12</option>
        </select>

        <button onclick="openSpectatorWindow()">📺 Zuschauer-Monitor</button>
        <button onclick="fullReset()">🆕 Reset</button>
    </div>
</div>

<div class="layout" id="layout"></div>

<div class="toast" id="toast"></div>

<script>
const state = {
    kehren:6,
    winsToChampion:5,
    arena:createArena(1)
};

function createArena(id){
    return {
        id,
        arenaName:`Finale`,
        bahn:1,
        teamA:`Mannschaft W`,
        teamB:`Mannschaft E`,
        pointsA:Array(6).fill(null),
        pointsB:Array(6).fill(null),
        winsA:0,
        winsB:0
    };
}

function render(){
    document.getElementById('layout').innerHTML = renderArena(state.arena);
    updateSpectatorWindow();
}

function renderArena(arena){

    const scoreA = sum(arena.pointsA);
    const scoreB = sum(arena.pointsB);

    return `
    <div class="arena">

        <div class="arena-header">
            <input
                    value="${arena.arenaName}"
                    onchange="setArenaName(this.value)"
                    style="font-size:1.1rem;font-weight:900;border:1px solid var(--border);padding:8px 12px;border-radius:10px;max-width:220px;"
                >

            <div class="bahn-selector">
                <strong>🎯 Bahn</strong>

                ${[1,2,3,4].map(b=>`
                    <button
                        class="bahn-btn ${arena.bahn===b?'active':''}"
                        onclick="setBahn(${b})">
                        ${b}
                    </button>
                `).join('')}
            </div>
        </div>

        <div class="team-inputs">
            <input value="${arena.teamA}" onchange="setTeam('A',this.value)">
            <div style="display:flex;align-items:center;font-weight:900">VS</div>
            <input value="${arena.teamB}" onchange="setTeam('B',this.value)">
        </div>

        <div class="scoreboard">

            <div class="score-card">
                <div class="team-name">${arena.teamA}</div>
                <div class="team-score">${scoreA}</div>
                <div class="team-points">
                    Gewonnene Spiele<br>
                    <span>${arena.winsA}</span>
                </div>
            </div>

            <div class="score-card red">
                <div class="team-name">${arena.teamB}</div>
                <div class="team-score">${scoreB}</div>
                <div class="team-points">
                    Gewonnene Spiele<br>
                    <span>${arena.winsB}</span>
                </div>
            </div>

        </div>

        <div class="info-bar">
            <div class="info-box">🎯 Bahn ${arena.bahn}</div>
            <div class="info-box">🏆 ${arena.winsA} : ${arena.winsB}</div>
        </div>

        <div class="kehren">

            <div>
                <div class="kehren-title">${arena.teamA}</div>
                ${renderKehren(arena,'A')}
            </div>

            <div>
                <div class="kehren-title">${arena.teamB}</div>
                ${renderKehren(arena,'B')}
            </div>

        </div>

        <div class="footer">
            <button class="gold" onclick="evaluateGame()">🏆 Spiel werten</button>
            <button onclick="resetCurrent()">🔄 Kehren löschen</button>
        </div>

    </div>
    `;
}

function renderKehren(arena,team){

    let html='';

    const arr = team==='A' ? arena.pointsA : arena.pointsB;

    for(let i=0;i<state.kehren;i++){

        const active = activeKehre(arena)===i+1;

        html += `
        <div class="kehre-row ${active?'active':''}">

            <div class="kehre-number">Kehre ${i+1}</div>

            <div class="points">
                ${[0,1,2,3,4].map(v=>`
                    <button
                        class="point-btn"
                        onclick="setPoints('${team}',${i},${v})">
                        ${v}
                    </button>
                `).join('')}
            </div>

            <div class="kehre-value">${arr[i] ?? '-'}</div>

        </div>
        `;
    }

    return html;
}

function setPoints(team,index,value){

    const arena = state.arena;

    if(hasWinner(arena)){
        toast('Training beendet');
        return;
    }

    if(team==='A'){
        arena.pointsA[index]=value;
        if(arena.pointsB[index]===null) arena.pointsB[index]=0;
    }else{
        arena.pointsB[index]=value;
        if(arena.pointsA[index]===null) arena.pointsA[index]=0;
    }

    render();
}

function evaluateGame(){

    const arena = state.arena;

    if(hasWinner(arena)){
        toast('Training beendet');
        return;
    }

    for(let i=0;i<state.kehren;i++){
        if(arena.pointsA[i]===null || arena.pointsB[i]===null){
            toast('Alle Kehren ausfüllen');
            return;
        }
    }

    const a = sum(arena.pointsA);
    const b = sum(arena.pointsB);

    if(a>b){
        arena.winsA++;
        toast(`${arena.teamA} gewinnt das Spiel`);
    }
    else if(b>a){
        arena.winsB++;
        toast(`${arena.teamB} gewinnt das Spiel`);
    }
    else{
        toast('Unentschieden');
    }

    arena.pointsA = Array(state.kehren).fill(null);
    arena.pointsB = Array(state.kehren).fill(null);

    if(hasWinner(arena)){
        toast(`🏆 ${winnerName(arena)} gewinnt das Training`);
    }

    render();
}

function activeKehre(arena){
    for(let i=0;i<state.kehren;i++){
        if(arena.pointsA[i]===null || arena.pointsB[i]===null){
            return i+1;
        }
    }
    return state.kehren;
}

function hasWinner(arena){
    return arena.winsA >= state.winsToChampion || arena.winsB >= state.winsToChampion;
}

function winnerName(arena){
    if(arena.winsA >= state.winsToChampion) return arena.teamA;
    if(arena.winsB >= state.winsToChampion) return arena.teamB;
    return '';
}

function sum(arr){
    return arr.reduce((a,b)=>a+(b||0),0);
}

function setBahn(bahn){
    state.arena.bahn = bahn;
    render();
}

function setArenaName(name){
    state.arena.arenaName = name;
    render();
}

function setTeam(team,name){
    if(team==='A') state.arena.teamA=name;
    else state.arena.teamB=name;
    render();
}

function resetCurrent(){
    state.arena.pointsA = Array(state.kehren).fill(null);
    state.arena.pointsB = Array(state.kehren).fill(null);
    render();
}

function fullReset(){
    state.arena = createArena(1);
    render();
}

let spectatorWindow=null;

function openSpectatorWindow(){

    spectatorWindow = window.open('','spectator','width=1920,height=1080');

    spectatorWindow.document.write(`
    <html>
    <head>
    <title>Zuschauer Monitor</title>

    <style>
    body{
        margin:0;
        background:#102417;
        color:white;
        font-family:Arial,sans-serif;
        padding:25px;
    }

    .card{
        background:white;
        color:black;
        border-radius:30px;
        padding:35px;
    }

    .title{
        font-size:3rem;
        font-weight:900;
        margin-bottom:20px;
        color:#1f5e3a;
    }

    .bahn{
        display:inline-block;
        background:#ffdf8c;
        padding:10px 18px;
        border-radius:12px;
        font-weight:900;
        margin-bottom:20px;
    }

    .teams{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:20px;
    }

    .team{
        background:#f5f8f3;
        border-radius:24px;
        padding:25px;
        text-align:center;
    }

    .name{
        font-size:2rem;
        font-weight:900;
    }

    .score{
        font-size:7rem;
        font-weight:900;
        color:#1f5e3a;
    }

    .wins{
        margin-top:10px;
        font-size:2rem;
        font-weight:700;
    }
    </style>
    </head>

    <body>
        <div class="card" id="specGrid"></div>
    </body>
    </html>
    `);

    spectatorWindow.document.close();

    updateSpectatorWindow();
}

function updateSpectatorWindow(){

    if(!spectatorWindow || spectatorWindow.closed) return;

    const arena = state.arena;

    const grid = spectatorWindow.document.getElementById('specGrid');

    if(!grid) return;

    grid.innerHTML = `
        <div class="title">${arena.arenaName}</div>
        <div class="bahn">🎯 Bahn ${arena.bahn}</div>

        <div class="teams">

            <div class="team">
                <div class="name">${arena.teamA}</div>
                <div class="score">${sum(arena.pointsA)}</div>
                <div class="wins">🏆 ${arena.winsA}</div>
            </div>

            <div class="team">
                <div class="name">${arena.teamB}</div>
                <div class="score">${sum(arena.pointsB)}</div>
                <div class="wins">🏆 ${arena.winsB}</div>
            </div>

        </div>
    `;
}

function toast(msg){
    const t=document.getElementById('toast');
    t.textContent=msg;
    t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),2000);
}

document.getElementById('kehrenSelect').addEventListener('change',e=>{
    state.kehren = Number(e.target.value);

    state.arena.pointsA = Array(state.kehren).fill(null);
    state.arena.pointsB = Array(state.kehren).fill(null);

    render();
});

document.getElementById('gamesSelect').addEventListener('change',e=>{
    state.winsToChampion = Number(e.target.value);
    render();
});

render();
</script>

</body>
</html>
